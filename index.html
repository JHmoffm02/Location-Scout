<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Scout — Location Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f11;
  --bg2: #161719;
  --bg3: #1e2022;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8e6e0;
  --text2: #888680;
  --text3: #555350;
  --accent: #c8a96e;
  --accent2: #a08650;
  --green: #4caf82;
  --blue: #5b9bd5;
  --amber: #d4943a;
  --red: #c26060;
  --radius: 10px;
  --sidebar: 260px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; }

/* Layout */
#app { display: flex; height: 100vh; }
#sidebar { width: var(--sidebar); background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Sidebar header */
.sidebar-head { padding: 20px 16px 14px; border-bottom: 1px solid var(--border); }
.sidebar-head .logo { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent); letter-spacing: 0.12em; font-weight: 500; }
.sidebar-head .project-name { font-size: 11px; color: var(--text3); margin-top: 3px; font-family: 'DM Mono', monospace; }

/* Search */
.sidebar-search { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.sidebar-search input { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; padding: 7px 10px; font-size: 12px; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; }
.sidebar-search input::placeholder { color: var(--text3); }
.sidebar-search input:focus { border-color: var(--accent2); }

/* Filter pills */
.filter-row { display: flex; gap: 5px; padding: 8px 12px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.filter-pill { padding: 3px 9px; border-radius: 99px; font-size: 10px; border: 1px solid var(--border2); color: var(--text2); cursor: pointer; font-family: 'DM Mono', monospace; letter-spacing: 0.04em; transition: all 0.15s; }
.filter-pill:hover { border-color: var(--accent2); color: var(--accent); }
.filter-pill.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

/* Location list */
#loc-list { flex: 1; overflow-y: auto; }
#loc-list::-webkit-scrollbar { width: 3px; }
#loc-list::-webkit-scrollbar-track { background: transparent; }
#loc-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.loc-item { padding: 11px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
.loc-item:hover { background: var(--bg3); }
.loc-item.active { background: var(--bg3); border-left: 2px solid var(--accent); padding-left: 14px; }
.loc-item-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.loc-item-addr { font-size: 11px; color: var(--text3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'DM Mono', monospace; }
.loc-item-footer { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.status-text { font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: 0.04em; }
.loc-item-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.mini-tag { font-size: 9px; padding: 1px 6px; border-radius: 3px; background: var(--bg); border: 1px solid var(--border2); color: var(--text3); font-family: 'DM Mono', monospace; }

/* Add button */
.add-btn { margin: 12px; padding: 10px; background: transparent; border: 1px solid var(--accent2); border-radius: var(--radius); color: var(--accent); font-size: 12px; font-family: 'DM Mono', monospace; cursor: pointer; letter-spacing: 0.06em; transition: all 0.15s; }
.add-btn:hover { background: var(--accent); color: var(--bg); }

/* Top bar */
#topbar { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--bg2); flex-shrink: 0; }
#topbar h1 { font-size: 15px; font-weight: 500; flex: 1; }
#topbar h1 span { color: var(--text3); font-weight: 300; font-family: 'DM Mono', monospace; font-size: 12px; margin-left: 8px; }
.tab-btn { padding: 6px 14px; font-size: 11px; border-radius: 6px; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; font-family: 'DM Mono', monospace; letter-spacing: 0.05em; transition: all 0.15s; }
.tab-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.tab-btn:hover:not(.active) { border-color: var(--accent2); color: var(--accent); }

/* Content area */
#content { flex: 1; overflow-y: auto; padding: 24px; }
#content::-webkit-scrollbar { width: 3px; }
#content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* Empty state */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--text3); font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.06em; }
.empty-state .big { font-size: 32px; margin-bottom: 8px; opacity: 0.3; }

/* Detail view */
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.detail-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.detail-card.full { grid-column: 1 / -1; }
.card-head { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-head-title { font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; color: var(--text3); }
.card-body { padding: 14px 16px; }

/* Field rows */
.field-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; gap: 12px; }
.field-row:last-child { border-bottom: none; }
.field-label { color: var(--text3); font-family: 'DM Mono', monospace; font-size: 11px; flex-shrink: 0; }
.field-val { color: var(--text); text-align: right; word-break: break-all; }
.field-val a { color: var(--accent); text-decoration: none; }
.field-val a:hover { text-decoration: underline; }

/* Status badge */
.status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 4px; font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: 0.05em; font-weight: 500; }

/* Tags */
.tag-list { display: flex; flex-wrap: wrap; gap: 5px; }
.tag { padding: 3px 9px; border-radius: 4px; font-size: 10px; font-family: 'DM Mono', monospace; background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); }

/* Notes */
.notes-block { background: var(--bg3); border-radius: 6px; padding: 12px; font-size: 12px; color: var(--text2); line-height: 1.7; font-style: italic; min-height: 60px; }

/* Files */
.file-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.file-item:last-child { border-bottom: none; }
.file-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-family: 'DM Mono', monospace; font-weight: 500; flex-shrink: 0; border: 1px solid var(--border2); }
.file-meta { flex: 1; min-width: 0; }
.file-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.file-sub { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; }
.file-link { color: var(--accent); font-size: 11px; font-family: 'DM Mono', monospace; text-decoration: none; flex-shrink: 0; }
.file-link:hover { text-decoration: underline; }

/* Permits */
.permit-item { padding: 10px 12px; background: var(--bg3); border-radius: 6px; margin-bottom: 8px; border: 1px solid var(--border); }
.permit-item:last-child { margin-bottom: 0; }
.permit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.permit-type { font-size: 12px; font-weight: 500; color: var(--text); }
.permit-detail { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

/* Cover photo */
.cover-photo { width: 100%; height: 180px; object-fit: cover; display: block; background: var(--bg3); }
.cover-placeholder { width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; background: var(--bg3); color: var(--text3); font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; cursor: pointer; transition: background 0.15s; }
.cover-placeholder:hover { background: var(--bg); }

/* Action buttons */
.action-row { display: flex; gap: 8px; flex-wrap: wrap; }
.action-btn { padding: 7px 14px; border-radius: 6px; font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.05em; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--text2); transition: all 0.15s; }
.action-btn:hover { border-color: var(--accent2); color: var(--accent); }
.action-btn.danger:hover { border-color: var(--red); color: var(--red); }

/* Coords */
.coords { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); }

/* Modal overlay */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 14px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; }
.modal-head { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-head h2 { font-size: 14px; font-weight: 500; }
.modal-close { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; line-height: 1; padding: 4px; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
.form-field { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; color: var(--text3); }
.form-input { background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; padding: 9px 12px; font-size: 13px; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.15s; }
.form-input:focus { border-color: var(--accent2); }
.form-input::placeholder { color: var(--text3); }
textarea.form-input { resize: vertical; min-height: 80px; line-height: 1.6; }
select.form-input { cursor: pointer; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
.btn-primary { padding: 9px 20px; background: var(--accent); color: var(--bg); border: none; border-radius: 6px; font-size: 12px; font-family: 'DM Mono', monospace; letter-spacing: 0.06em; cursor: pointer; font-weight: 500; transition: opacity 0.15s; }
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-cancel { padding: 9px 20px; background: transparent; color: var(--text2); border: 1px solid var(--border2); border-radius: 6px; font-size: 12px; font-family: 'DM Mono', monospace; letter-spacing: 0.06em; cursor: pointer; transition: all 0.15s; }
.btn-cancel:hover { border-color: var(--accent2); color: var(--accent); }

/* Toast */
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; padding: 12px 16px; font-size: 12px; font-family: 'DM Mono', monospace; z-index: 200; transform: translateY(60px); opacity: 0; transition: all 0.3s; max-width: 300px; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: var(--green); color: var(--green); }
.toast.error { border-color: var(--red); color: var(--red); }

/* Loading */
.loading { display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--text3); font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; padding: 40px; }
.spinner { width: 14px; height: 14px; border: 1.5px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Map view */
#map-view { flex: 1; overflow: hidden; position: relative; }
#map-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text3); font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.06em; background: var(--bg); }
.map-pin-list { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 400px; }
.map-pin-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: border-color 0.15s; }
.map-pin-item:hover { border-color: var(--accent2); }
.pin-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.pin-name { font-size: 13px; font-weight: 500; flex: 1; }
.pin-coords { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; }

/* Status colors */
.s-identified { color: var(--text3); }
.s-scouted { color: var(--blue); }
.s-pending { color: var(--amber); }
.s-approved { color: var(--green); }
.s-rejected { color: var(--red); }
.dot-identified { background: var(--text3); }
.dot-scouted { background: var(--blue); }
.dot-pending { background: var(--amber); }
.dot-approved { background: var(--green); }
.dot-rejected { background: var(--red); }
.bg-identified { background: rgba(85,83,80,0.15); }
.bg-scouted { background: rgba(91,155,213,0.15); }
.bg-pending { background: rgba(212,148,58,0.15); }
.bg-approved { background: rgba(76,175,130,0.15); }
.bg-rejected { background: rgba(194,96,96,0.15); }

/* Responsive */
@media (max-width: 700px) {
  :root { --sidebar: 0px; }
  #sidebar { display: none; }
  .detail-grid { grid-template-columns: 1fr; }
}
@media (max-width: 900px) {
  .detail-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-head">
      <div class="logo">SCOUT</div>
      <div class="project-name">location manager</div>
    </div>
    <div class="sidebar-search">
      <input type="text" id="search-input" placeholder="search locations..." oninput="filterLocations()">
    </div>
    <div class="filter-row" id="filter-row">
      <div class="filter-pill active" data-status="all" onclick="setFilter(this)">all</div>
      <div class="filter-pill" data-status="identified" onclick="setFilter(this)">identified</div>
      <div class="filter-pill" data-status="scouted" onclick="setFilter(this)">scouted</div>
      <div class="filter-pill" data-status="pending" onclick="setFilter(this)">pending</div>
      <div class="filter-pill" data-status="approved" onclick="setFilter(this)">approved</div>
    </div>
    <div id="loc-list"><div class="loading"><div class="spinner"></div>loading...</div></div>
    <button class="add-btn" onclick="openAddModal()">+ add location</button>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <h1 id="main-title">Select a location <span id="loc-count"></span></h1>
      <button class="tab-btn active" id="tab-detail" onclick="setTab('detail')">detail</button>
      <button class="tab-btn" id="tab-files" onclick="setTab('files')">files</button>
      <button class="tab-btn" id="tab-permits" onclick="setTab('permits')">permits</button>
      <button class="tab-btn" id="tab-map" onclick="setTab('map')">map</button>
    </div>
    <div id="content">
      <div class="empty-state">
        <div class="big">◎</div>
        <div>no location selected</div>
        <div style="color:var(--text3);font-size:10px">pick one from the list or add new</div>
      </div>
    </div>
  </div>
</div>

<!-- Add Location Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-head">
      <h2>Add location</h2>
      <button class="modal-close" onclick="closeModal('add-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-field">
        <label class="form-label">location name *</label>
        <input class="form-input" id="f-name" placeholder="e.g. Brooklyn Waterfront" type="text">
      </div>
      <div class="form-field">
        <label class="form-label">address</label>
        <input class="form-input" id="f-address" placeholder="Street address" type="text">
      </div>
      <div class="form-grid">
        <div class="form-field">
          <label class="form-label">city</label>
          <input class="form-input" id="f-city" placeholder="Brooklyn" type="text">
        </div>
        <div class="form-field">
          <label class="form-label">state</label>
          <input class="form-input" id="f-state" placeholder="NY" type="text">
        </div>
      </div>
      <div class="form-grid">
        <div class="form-field">
          <label class="form-label">latitude</label>
          <input class="form-input" id="f-lat" placeholder="40.6748" type="number" step="any">
        </div>
        <div class="form-field">
          <label class="form-label">longitude</label>
          <input class="form-input" id="f-lng" placeholder="-74.0168" type="number" step="any">
        </div>
      </div>
      <div class="form-field">
        <label class="form-label">status</label>
        <select class="form-input" id="f-status">
          <option value="identified">identified</option>
          <option value="scouted">scouted</option>
          <option value="pending">pending</option>
          <option value="approved">approved</option>
          <option value="rejected">rejected</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">tags (comma separated)</label>
        <input class="form-input" id="f-tags" placeholder="Exterior, Water, Industrial, Golden hour" type="text">
      </div>
      <div class="form-field">
        <label class="form-label">smugmug gallery url</label>
        <input class="form-input" id="f-smugmug" placeholder="https://yourname.smugmug.com/..." type="url">
      </div>
      <div class="form-field">
        <label class="form-label">cover photo url</label>
        <input class="form-input" id="f-cover" placeholder="Direct image URL for thumbnail" type="url">
      </div>
      <div class="form-field">
        <label class="form-label">scout notes</label>
        <textarea class="form-input" id="f-notes" placeholder="Lighting conditions, access notes, contacts, restrictions..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('add-modal')">cancel</button>
      <button class="btn-primary" id="save-btn" onclick="saveLocation()">save location</button>
    </div>
  </div>
</div>

<!-- Add File Modal -->
<div class="modal-overlay" id="file-modal">
  <div class="modal">
    <div class="modal-head">
      <h2>Add file reference</h2>
      <button class="modal-close" onclick="closeModal('file-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-field">
        <label class="form-label">filename *</label>
        <input class="form-input" id="ff-name" placeholder="e.g. rooftop_01.jpg" type="text">
      </div>
      <div class="form-field">
        <label class="form-label">url *</label>
        <input class="form-input" id="ff-url" placeholder="SmugMug or other URL" type="url">
      </div>
      <div class="form-grid">
        <div class="form-field">
          <label class="form-label">file type</label>
          <select class="form-input" id="ff-type">
            <option value="photo">photo</option>
            <option value="video">video</option>
            <option value="pdf">pdf</option>
            <option value="other">other</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label">source</label>
          <select class="form-input" id="ff-source">
            <option value="smugmug">smugmug</option>
            <option value="external">external</option>
            <option value="supabase">supabase</option>
          </select>
        </div>
      </div>
      <div class="form-field">
        <label class="form-label">caption</label>
        <input class="form-input" id="ff-caption" placeholder="Brief description" type="text">
      </div>
      <div class="form-field">
        <label class="form-label">file size</label>
        <input class="form-input" id="ff-size" placeholder="e.g. 4.2 MB" type="text">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('file-modal')">cancel</button>
      <button class="btn-primary" onclick="saveFile()">add file</button>
    </div>
  </div>
</div>

<!-- Add Permit Modal -->
<div class="modal-overlay" id="permit-modal">
  <div class="modal">
    <div class="modal-head">
      <h2>Add permit</h2>
      <button class="modal-close" onclick="closeModal('permit-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-field">
        <label class="form-label">permit type *</label>
        <input class="form-input" id="fp-type" placeholder="e.g. NYC Parks Film Permit" type="text">
      </div>
      <div class="form-grid">
        <div class="form-field">
          <label class="form-label">status</label>
          <select class="form-input" id="fp-status">
            <option value="needed">needed</option>
            <option value="filed">filed</option>
            <option value="approved">approved</option>
            <option value="denied">denied</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label">deadline</label>
          <input class="form-input" id="fp-deadline" type="date">
        </div>
      </div>
      <div class="form-field">
        <label class="form-label">issuing body</label>
        <input class="form-input" id="fp-body" placeholder="e.g. NYC Mayors Office of Media" type="text">
      </div>
      <div class="form-grid">
        <div class="form-field">
          <label class="form-label">contact name</label>
          <input class="form-input" id="fp-contact" placeholder="Name" type="text">
        </div>
        <div class="form-field">
          <label class="form-label">contact email</label>
          <input class="form-input" id="fp-email" placeholder="email@..." type="email">
        </div>
      </div>
      <div class="form-field">
        <label class="form-label">document url</label>
        <input class="form-input" id="fp-doc" placeholder="Link to filed permit doc" type="url">
      </div>
      <div class="form-field">
        <label class="form-label">notes</label>
        <textarea class="form-input" id="fp-notes" placeholder="Any additional notes..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('permit-modal')">cancel</button>
      <button class="btn-primary" onclick="savePermit()">add permit</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://bdnezxdfhapaxhoedtrp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkbmV6eGRmaGFwYXhob2VkdHJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTgwMTAsImV4cCI6MjA5MTU3NDAxMH0.tdyh77PJ4xSOnb4GeLQRHcDWd0l2KRMpgl7Awj7NiB0';

const api = (path, opts={}) => fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
  headers: {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': opts.prefer || 'return=representation',
    ...opts.headers
  },
  ...opts
}).then(r => r.ok ? r.json() : r.json().then(e => Promise.reject(e)));

let allLocations = [];
let activeId = null;
let activeTab = 'detail';
let activeFilter = 'all';

// ---- STATUS HELPERS ----
function statusColor(s) { return `s-${s}`; }
function dotColor(s) { return `dot-${s}`; }
function bgColor(s) { return `bg-${s}`; }

function statusBadge(s) {
  return `<span class="status-badge ${bgColor(s)} ${statusColor(s)}">
    <span class="status-dot ${dotColor(s)}"></span>${s}
  </span>`;
}

// ---- TOAST ----
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 3000);
}

// ---- LOAD LOCATIONS ----
async function loadLocations() {
  try {
    const data = await api('locations?select=*&order=created_at.desc');
    allLocations = data;
    renderList();
    document.getElementById('loc-count').textContent = `· ${data.length} locations`;
  } catch(e) {
    document.getElementById('loc-list').innerHTML = `<div class="loading" style="color:var(--red)">connection error</div>`;
    showToast('Could not connect to database', 'error');
  }
}

// ---- RENDER LIST ----
function renderList() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const filtered = allLocations.filter(l => {
    const matchFilter = activeFilter === 'all' || l.status === activeFilter;
    const matchSearch = !search || l.name.toLowerCase().includes(search) ||
      (l.address||'').toLowerCase().includes(search) ||
      (l.city||'').toLowerCase().includes(search) ||
      (l.tags||[]).some(t => t.toLowerCase().includes(search));
    return matchFilter && matchSearch;
  });

  const el = document.getElementById('loc-list');
  if (!filtered.length) {
    el.innerHTML = `<div class="loading" style="flex-direction:column;gap:4px"><span>no locations</span><span style="font-size:10px;color:var(--text3)">try a different filter</span></div>`;
    return;
  }

  el.innerHTML = filtered.map(l => `
    <div class="loc-item${l.id===activeId?' active':''}" onclick="selectLocation('${l.id}')">
      <div class="loc-item-name">${l.name}</div>
      <div class="loc-item-addr">${[l.address,l.city,l.state].filter(Boolean).join(', ') || '—'}</div>
      <div class="loc-item-footer">
        <span class="status-dot ${dotColor(l.status)}"></span>
        <span class="status-text ${statusColor(l.status)}">${l.status}</span>
      </div>
      ${(l.tags||[]).length ? `<div class="loc-item-tags">${l.tags.slice(0,3).map(t=>`<span class="mini-tag">${t}</span>`).join('')}</div>` : ''}
    </div>
  `).join('');
}

function filterLocations() { renderList(); }

function setFilter(el) {
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  activeFilter = el.dataset.status;
  renderList();
}

// ---- SELECT LOCATION ----
function selectLocation(id) {
  activeId = id;
  renderList();
  renderTab();
}

function setTab(tab) {
  activeTab = tab;
  ['detail','files','permits','map'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t===tab);
  });
  renderTab();
}

async function renderTab() {
  const loc = allLocations.find(l => l.id === activeId);
  if (!loc) return;

  document.getElementById('main-title').textContent = loc.name;
  document.getElementById('main-title').innerHTML = `${loc.name} <span>${loc.city||''} ${loc.state||''}</span>`;

  if (activeTab === 'detail') renderDetail(loc);
  else if (activeTab === 'files') await renderFiles(loc);
  else if (activeTab === 'permits') await renderPermits(loc);
  else if (activeTab === 'map') renderMap(loc);
}

// ---- DETAIL TAB ----
function renderDetail(loc) {
  const tags = (loc.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  document.getElementById('content').innerHTML = `
    <div class="detail-grid">

      <div class="detail-card full">
        ${loc.cover_photo_url
          ? `<img class="cover-photo" src="${loc.cover_photo_url}" alt="${loc.name}" onerror="this.style.display='none'">`
          : `<div class="cover-placeholder" onclick="editCoverPhoto('${loc.id}')">+ add cover photo url</div>`}
      </div>

      <div class="detail-card">
        <div class="card-head"><span class="card-head-title">location info</span>${statusBadge(loc.status)}</div>
        <div class="card-body">
          <div class="field-row"><span class="field-label">address</span><span class="field-val">${loc.address||'—'}</span></div>
          <div class="field-row"><span class="field-label">city / state</span><span class="field-val">${[loc.city,loc.state].filter(Boolean).join(', ')||'—'}</span></div>
          <div class="field-row"><span class="field-label">coordinates</span><span class="field-val coords">${loc.lat&&loc.lng ? `${Number(loc.lat).toFixed(4)}° N, ${Number(loc.lng).toFixed(4)}° W` : '—'}</span></div>
          <div class="field-row"><span class="field-label">added</span><span class="field-val">${new Date(loc.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span></div>
          ${loc.smugmug_gallery_url ? `<div class="field-row"><span class="field-label">smugmug</span><span class="field-val"><a href="${loc.smugmug_gallery_url}" target="_blank">open gallery ↗</a></span></div>` : ''}
        </div>
      </div>

      <div class="detail-card">
        <div class="card-head"><span class="card-head-title">tags</span></div>
        <div class="card-body">
          ${tags ? `<div class="tag-list">${tags}</div>` : '<span style="color:var(--text3);font-size:12px">no tags yet</span>'}
        </div>
      </div>

      <div class="detail-card full">
        <div class="card-head"><span class="card-head-title">scout notes</span></div>
        <div class="card-body">
          <div class="notes-block">${loc.notes || '<span style="color:var(--text3)">no notes yet</span>'}</div>
        </div>
      </div>

      <div class="detail-card full">
        <div class="card-head"><span class="card-head-title">actions</span></div>
        <div class="card-body">
          <div class="action-row">
            <button class="action-btn" onclick="changeStatus('${loc.id}','scouted')">mark scouted</button>
            <button class="action-btn" onclick="changeStatus('${loc.id}','pending')">mark pending</button>
            <button class="action-btn" onclick="changeStatus('${loc.id}','approved')">mark approved</button>
            <button class="action-btn danger" onclick="deleteLocation('${loc.id}')">delete location</button>
          </div>
        </div>
      </div>

    </div>`;
}

// ---- FILES TAB ----
async function renderFiles(loc) {
  document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div>loading files...</div>`;
  try {
    const files = await api(`files?location_id=eq.${loc.id}&order=uploaded_at.desc`);
    const typeColors = { photo:'#4caf82', video:'#5b9bd5', pdf:'#c26060', other:'#888680' };

    document.getElementById('content').innerHTML = `
      <div class="detail-grid">
        <div class="detail-card full">
          <div class="card-head">
            <span class="card-head-title">files (${files.length})</span>
            <button class="action-btn" onclick="openFileModal('${loc.id}')">+ add file</button>
          </div>
          <div class="card-body">
            ${files.length === 0 ? '<div style="color:var(--text3);font-size:12px;padding:8px 0">no files yet — add a SmugMug URL or other reference</div>' :
              files.map(f => `
                <div class="file-item">
                  <div class="file-icon" style="color:${typeColors[f.file_type]||'#888'};border-color:${typeColors[f.file_type]||'#888'}22;background:${typeColors[f.file_type]||'#888'}11">
                    ${f.file_type==='photo'?'IMG':f.file_type==='video'?'VID':f.file_type==='pdf'?'PDF':'FILE'}
                  </div>
                  <div class="file-meta">
                    <div class="file-name">${f.filename}</div>
                    <div class="file-sub">${f.source||'—'} · ${f.file_size||'—'} ${f.caption?'· '+f.caption:''}</div>
                  </div>
                  ${f.url ? `<a class="file-link" href="${f.url}" target="_blank">open ↗</a>` : ''}
                </div>
              `).join('')}
          </div>
        </div>
      </div>`;
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="loading" style="color:var(--red)">error loading files</div>`;
  }
}

// ---- PERMITS TAB ----
async function renderPermits(loc) {
  document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div>loading permits...</div>`;
  try {
    const permits = await api(`permits?location_id=eq.${loc.id}&order=created_at.desc`);
    const pColors = { needed:['var(--amber)','rgba(212,148,58,0.1)'], filed:['var(--blue)','rgba(91,155,213,0.1)'], approved:['var(--green)','rgba(76,175,130,0.1)'], denied:['var(--red)','rgba(194,96,96,0.1)'] };

    document.getElementById('content').innerHTML = `
      <div class="detail-grid">
        <div class="detail-card full">
          <div class="card-head">
            <span class="card-head-title">permits (${permits.length})</span>
            <button class="action-btn" onclick="openPermitModal('${loc.id}')">+ add permit</button>
          </div>
          <div class="card-body">
            ${permits.length === 0 ? '<div style="color:var(--text3);font-size:12px;padding:8px 0">no permits tracked yet</div>' :
              permits.map(p => {
                const [col, bg] = pColors[p.status]||['var(--text3)','var(--bg3)'];
                return `<div class="permit-item" style="border-color:${col}33;background:${bg}">
                  <div class="permit-header">
                    <span class="permit-type">${p.permit_type}</span>
                    <span class="status-badge" style="background:${bg};color:${col}">${p.status}</span>
                  </div>
                  <div class="permit-detail">${p.issuing_body||''} ${p.deadline?'· deadline: '+new Date(p.deadline).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):''}</div>
                  ${p.contact_name||p.contact_email ? `<div class="permit-detail" style="margin-top:3px">${p.contact_name||''} ${p.contact_email?'· '+p.contact_email:''}</div>` : ''}
                  ${p.notes?`<div class="permit-detail" style="margin-top:3px;font-style:italic">${p.notes}</div>`:''}
                  ${p.doc_url?`<div style="margin-top:6px"><a href="${p.doc_url}" target="_blank" class="file-link">view doc ↗</a></div>`:''}
                </div>`;
              }).join('')}
          </div>
        </div>
      </div>`;
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="loading" style="color:var(--red)">error loading permits</div>`;
  }
}

// ---- MAP TAB ----
function renderMap(loc) {
  const hasCoords = loc.lat && loc.lng;
  const nearby = allLocations.filter(l => l.lat && l.lng);

  document.getElementById('content').innerHTML = `
    <div class="detail-card full" style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius)">
      <div class="card-head"><span class="card-head-title">map & coordinates</span></div>
      <div class="card-body">
        ${hasCoords ? `
          <div class="field-row"><span class="field-label">latitude</span><span class="field-val coords">${Number(loc.lat).toFixed(6)}°</span></div>
          <div class="field-row"><span class="field-label">longitude</span><span class="field-val coords">${Number(loc.lng).toFixed(6)}°</span></div>
          <div style="margin-top:12px">
            <a class="action-btn" style="display:inline-block;text-decoration:none;padding:7px 14px;border-radius:6px;font-size:11px;font-family:'DM Mono',monospace;letter-spacing:0.05em;border:1px solid var(--border2);color:var(--text2)" href="https://www.google.com/maps?q=${loc.lat},${loc.lng}" target="_blank">open in google maps ↗</a>
            <a class="action-btn" style="display:inline-block;text-decoration:none;padding:7px 14px;border-radius:6px;font-size:11px;font-family:'DM Mono',monospace;letter-spacing:0.05em;border:1px solid var(--border2);color:var(--text2);margin-left:8px" href="https://maps.apple.com/?q=${loc.lat},${loc.lng}" target="_blank">open in apple maps ↗</a>
          </div>` :
          `<div style="color:var(--text3);font-size:12px">no coordinates saved — add lat/lng when creating or editing this location</div>`}
      </div>
    </div>

    ${nearby.length > 1 ? `
    <div class="detail-card full" style="margin-top:16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius)">
      <div class="card-head"><span class="card-head-title">all pinned locations</span></div>
      <div class="card-body">
        <div class="map-pin-list">
          ${nearby.map(l=>`
            <div class="map-pin-item" onclick="selectLocation('${l.id}')">
              <span class="pin-dot ${dotColor(l.status)}"></span>
              <span class="pin-name">${l.name}</span>
              <span class="pin-coords">${Number(l.lat).toFixed(4)}, ${Number(l.lng).toFixed(4)}</span>
            </div>`).join('')}
        </div>
      </div>
    </div>` : ''}`;
}

// ---- ADD LOCATION ----
function openAddModal() {
  ['f-name','f-address','f-city','f-state','f-lat','f-lng','f-tags','f-smugmug','f-cover','f-notes'].forEach(id => document.getElementById(id).value='');
  document.getElementById('f-status').value = 'identified';
  document.getElementById('add-modal').classList.add('open');
  document.getElementById('f-name').focus();
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

async function saveLocation() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('Location name is required', 'error'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'saving...';

  const tagsRaw = document.getElementById('f-tags').value;
  const tags = tagsRaw ? tagsRaw.split(',').map(t=>t.trim()).filter(Boolean) : [];

  const payload = {
    name,
    address: document.getElementById('f-address').value||null,
    city: document.getElementById('f-city').value||null,
    state: document.getElementById('f-state').value||null,
    lat: document.getElementById('f-lat').value ? parseFloat(document.getElementById('f-lat').value) : null,
    lng: document.getElementById('f-lng').value ? parseFloat(document.getElementById('f-lng').value) : null,
    status: document.getElementById('f-status').value,
    tags,
    smugmug_gallery_url: document.getElementById('f-smugmug').value||null,
    cover_photo_url: document.getElementById('f-cover').value||null,
    notes: document.getElementById('f-notes').value||null,
  };

  try {
    const [newLoc] = await api('locations', { method:'POST', body: JSON.stringify(payload) });
    allLocations.unshift(newLoc);
    renderList();
    closeModal('add-modal');
    selectLocation(newLoc.id);
    showToast(`${name} added`);
  } catch(e) {
    showToast('Error saving location', 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'save location';
  }
}

// ---- STATUS CHANGE ----
async function changeStatus(id, status) {
  try {
    await api(`locations?id=eq.${id}`, { method:'PATCH', body: JSON.stringify({status}), prefer:'return=minimal', headers:{'Prefer':'return=minimal'} });
    const loc = allLocations.find(l=>l.id===id);
    if (loc) loc.status = status;
    renderList();
    if (activeId === id) renderTab();
    showToast(`Status → ${status}`);
  } catch(e) { showToast('Error updating status','error'); }
}

// ---- DELETE ----
async function deleteLocation(id) {
  if (!confirm('Delete this location? This cannot be undone.')) return;
  try {
    await api(`locations?id=eq.${id}`, { method:'DELETE', headers:{'Prefer':'return=minimal'} });
    allLocations = allLocations.filter(l=>l.id!==id);
    activeId = null;
    renderList();
    document.getElementById('content').innerHTML = `<div class="empty-state"><div class="big">◎</div><div>location deleted</div></div>`;
    document.getElementById('main-title').textContent = 'Select a location';
    showToast('Location deleted');
  } catch(e) { showToast('Error deleting','error'); }
}

// ---- FILES ----
let fileLocationId = null;
function openFileModal(locId) {
  fileLocationId = locId;
  ['ff-name','ff-url','ff-caption','ff-size'].forEach(id => document.getElementById(id).value='');
  document.getElementById('file-modal').classList.add('open');
}

async function saveFile() {
  const name = document.getElementById('ff-name').value.trim();
  const url = document.getElementById('ff-url').value.trim();
  if (!name || !url) { showToast('Filename and URL required','error'); return; }
  try {
    await api('files', { method:'POST', body: JSON.stringify({
      location_id: fileLocationId,
      filename: name, url,
      file_type: document.getElementById('ff-type').value,
      source: document.getElementById('ff-source').value,
      caption: document.getElementById('ff-caption').value||null,
      file_size: document.getElementById('ff-size').value||null,
    })});
    closeModal('file-modal');
    showToast('File added');
    if (activeId === fileLocationId) renderFiles(allLocations.find(l=>l.id===activeId));
  } catch(e) { showToast('Error adding file','error'); }
}

// ---- PERMITS ----
let permitLocationId = null;
function openPermitModal(locId) {
  permitLocationId = locId;
  ['fp-type','fp-body','fp-contact','fp-email','fp-doc','fp-notes','fp-deadline'].forEach(id => document.getElementById(id).value='');
  document.getElementById('fp-status').value = 'needed';
  document.getElementById('permit-modal').classList.add('open');
}

async function savePermit() {
  const type = document.getElementById('fp-type').value.trim();
  if (!type) { showToast('Permit type required','error'); return; }
  try {
    await api('permits', { method:'POST', body: JSON.stringify({
      location_id: permitLocationId,
      permit_type: type,
      status: document.getElementById('fp-status').value,
      issuing_body: document.getElementById('fp-body').value||null,
      contact_name: document.getElementById('fp-contact').value||null,
      contact_email: document.getElementById('fp-email').value||null,
      deadline: document.getElementById('fp-deadline').value||null,
      doc_url: document.getElementById('fp-doc').value||null,
      notes: document.getElementById('fp-notes').value||null,
    })});
    closeModal('permit-modal');
    showToast('Permit added');
    if (activeId === permitLocationId) renderPermits(allLocations.find(l=>l.id===activeId));
  } catch(e) { showToast('Error adding permit','error'); }
}

// ---- COVER PHOTO ----
function editCoverPhoto(id) {
  const url = prompt('Enter cover photo URL (direct image link):');
  if (!url) return;
  changeField(id, {cover_photo_url: url});
}

async function changeField(id, fields) {
  try {
    await api(`locations?id=eq.${id}`, { method:'PATCH', body: JSON.stringify(fields), headers:{'Prefer':'return=minimal'} });
    Object.assign(allLocations.find(l=>l.id===id), fields);
    renderTab();
    showToast('Updated');
  } catch(e) { showToast('Error updating','error'); }
}

// ---- KEYBOARD ----
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open'));
  if ((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); document.getElementById('search-input').focus(); }
});

document.querySelectorAll('.modal-overlay').forEach(m => m.addEventListener('click', e => { if(e.target===m) m.classList.remove('open'); }));

// ---- INIT ----
loadLocations();
</script>
</body>
</html>
